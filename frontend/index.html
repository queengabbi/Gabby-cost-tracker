<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CWA Cost Tracker Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="config.js"></script>
    <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

        body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: #333;
    }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
    }

    header {
      background: linear-gradient(135deg, #8b5cf6 0%, #a855f7 50%, #c084fc 100%);
      color: white;
      padding: 30px;
      text-align: center;
      border-radius: 20px;
      margin-bottom: 30px;
      box-shadow: 0 20px 40px rgba(139, 92, 246, 0.3);
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(180deg); }
    }

    header h1 {
      font-size: 2.5em;
      font-weight: 700;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }

    header p {
      font-size: 1.2em;
      opacity: 0.9;
      position: relative;
      z-index: 1;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-bottom: 30px;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15);
    }

    .card h2 {
      color: #8b5cf6;
      margin-bottom: 20px;
      font-size: 1.8em;
      font-weight: 600;
    }

    .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: linear-gradient(135deg, #a855f7 0%, #c084fc 100%);
      color: white;
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(168, 85, 247, 0.3);
      transition: transform 0.3s ease;
    }

    .stat-card:hover {
      transform: scale(1.05);
    }

    .stat-card h3 {
      font-size: 0.9em;
      opacity: 0.9;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-card .value {
      font-size: 2.5em;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .stat-card .trend {
      font-size: 0.9em;
      opacity: 0.8;
    }

    .chart-container {
      position: relative;
      height: 400px;
      margin-top: 20px;
    }

    #logs {
      max-height: 400px;
      overflow-y: auto;
      background: rgba(248, 250, 252, 0.8);
      border-radius: 15px;
      padding: 20px;
      border: 1px solid rgba(139, 92, 246, 0.2);
    }

    .log-entry {
      padding: 15px;
      margin-bottom: 15px;
      background: white;
      border-radius: 10px;
      border-left: 4px solid #8b5cf6;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
      transition: transform 0.2s ease;
    }

    .log-entry:hover {
      transform: translateX(5px);
    }

    .log-entry:last-child {
      margin-bottom: 0;
    }

    .log-entry .message {
      font-weight: 500;
      color: #374151;
      margin-bottom: 8px;
    }

    .timestamp {
      font-size: 0.85em;
      color: #8b5cf6;
      font-weight: 500;
    }

    button {
      background: linear-gradient(135deg, #8b5cf6 0%, #a855f7 100%);
      color: white;
      border: none;
      padding: 15px 30px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 1em;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(139, 92, 246, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .loading {
      text-align: center;
      color: #8b5cf6;
      font-size: 1.1em;
      padding: 40px;
    }

    .error {
      color: #ef4444;
      text-align: center;
            padding: 20px;
      background: rgba(239, 68, 68, 0.1);
      border-radius: 10px;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .refresh-btn {
            text-align: center;
      margin-top: 20px;
    }

    /* Custom scrollbar */
    #logs::-webkit-scrollbar {
      width: 8px;
    }

    #logs::-webkit-scrollbar-track {
      background: rgba(139, 92, 246, 0.1);
      border-radius: 10px;
    }

    #logs::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, #8b5cf6 0%, #a855f7 100%);
      border-radius: 10px;
    }

    #logs::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(135deg, #7c3aed 0%, #9333ea 100%);
    }

    /* Responsive design */
    @media (max-width: 768px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
      
      .stats-container {
        grid-template-columns: 1fr;
      }
      
      header h1 {
        font-size: 2em;
      }
      
      .container {
        padding: 10px;
      }
    }

    /* Animation for loading */
    .pulse {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
    <header>
      <h1>🚀 CWA Cost Tracker Dashboard</h1>
      <p>Real-time AWS Cost Monitoring & Alerts</p>
    </header>

    <div class="stats-container">
      <div class="stat-card">
        <h3>Total Alerts</h3>
        <div class="value" id="totalAlerts">-</div>
        <div class="trend">Last 24 hours</div>
            </div>
      <div class="stat-card">
        <h3>Latest Alert</h3>
        <div class="value" id="latestAlert">-</div>
        <div class="trend">Minutes ago</div>
            </div>
      <div class="stat-card">
        <h3>System Status</h3>
        <div class="value" id="systemStatus">🟢</div>
        <div class="trend">All systems operational</div>
            </div>
        </div>

    <div class="dashboard-grid">
      <div class="card">
        <h2>📊 Cost Trend Analysis</h2>
        <div class="chart-container">
            <canvas id="costChart"></canvas>
        </div>
      </div>

      <div class="card">
        <h2>🔔 Latest Cost Alerts</h2>
        <div id="logs" class="loading pulse">Loading alerts...</div>
        <div class="refresh-btn">
          <button onclick="loadLogs()">🔄 Refresh Alerts</button>
        </div>
      </div>
        </div>
    </div>

    <script>
    let costChart = null;

    async function loadLogs() {
            try {
        const logsContainer = document.getElementById("logs");
        logsContainer.innerHTML = '<div class="loading pulse">Loading alerts...</div>';
        
        const response = await fetch(window.API_ENDPOINT || '/api/costs');
                const data = await response.json();
        
        if (!Array.isArray(data) || data.length === 0) {
          logsContainer.innerHTML = '<div class="loading">No alerts found. System is running smoothly! 🎉</div>';
          updateStats(0, 'No recent alerts', '🟢');
          return;
        }

        // Sort by timestamp (newest first)
        data.sort((a, b) => new Date(b.id) - new Date(a.id));

        logsContainer.innerHTML = data.map(item => `
          <div class="log-entry">
            <div class="message">${item.message}</div>
            <div class="timestamp">⏰ ${new Date(item.id).toLocaleString()}</div>
          </div>
        `).join("");

        // Update stats with proper time formatting
        const latestAlert = data[0] ? new Date(data[0].id).toLocaleString() : 'N/A';
        const status = data.length > 0 ? '🟡' : '🟢';
        updateStats(data.length, latestAlert, status);
        
        // Update chart with mock data for demonstration
        updateChart(data);

      } catch (err) {
        document.getElementById("logs").innerHTML = '<div class="error">❌ Error loading alerts. Please check your connection and try again.</div>';
        updateStats(0, 'Error', '🔴');
        console.error('Error loading logs:', err);
      }
    }

    function updateStats(totalAlerts, latestAlert, status) {
      document.getElementById('totalAlerts').textContent = totalAlerts;
      document.getElementById('latestAlert').textContent = latestAlert;
      document.getElementById('systemStatus').textContent = status;
    }

    function updateChart(data) {
      const ctx = document.getElementById('costChart').getContext('2d');
      
      if (costChart) {
        costChart.destroy();
      }

      // Extract real cost data from alerts
      const dates = [];
      const costs = [];
      
      if (data && data.length > 0) {
        // Sort data by date
        const sortedData = data.sort((a, b) => new Date(a.id) - new Date(b.id));
        
        sortedData.forEach(item => {
          const date = new Date(item.id);
          dates.push(date.toLocaleDateString());
          
          // Use cost field if available, otherwise extract from message
          let cost = 0;
          if (item.cost) {
            cost = parseFloat(item.cost);
          } else {
            const costMatch = item.message.match(/\$(\d+\.?\d*)/);
            cost = costMatch ? parseFloat(costMatch[1]) : 0;
          }
          costs.push(cost);
        });
      }
      
      // If no real data, show message
      if (costs.length === 0) {
        dates.push('No Data');
        costs.push(0);
      }

      costChart = new Chart(ctx, {
                type: 'line',
                data: {
          labels: dates,
                    datasets: [{
            label: 'Daily Cost ($)',
            data: costs,
            borderColor: '#8b5cf6',
            backgroundColor: 'rgba(139, 92, 246, 0.1)',
            borderWidth: 3,
            tension: 0.4,
            fill: true,
            pointBackgroundColor: '#a855f7',
            pointBorderColor: '#8b5cf6',
            pointBorderWidth: 2,
            pointRadius: 6,
            pointHoverRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
          plugins: {
            legend: {
              display: true,
              position: 'top',
              labels: {
                color: '#8b5cf6',
                font: {
                  size: 14,
                  weight: 'bold'
                }
              }
            }
          },
                    scales: {
                        y: {
                            beginAtZero: true,
              grid: {
                color: 'rgba(139, 92, 246, 0.1)'
              },
              ticks: {
                color: '#6b7280',
                callback: function(value) {
                  return '$' + value.toFixed(0);
                }
              },
              title: {
                display: true,
                text: 'Cost (USD)',
                color: '#8b5cf6',
                font: {
                  size: 14,
                  weight: 'bold'
                }
              }
            },
            x: {
              grid: {
                color: 'rgba(139, 92, 246, 0.1)'
              },
              ticks: {
                color: '#6b7280'
              },
                            title: {
                                display: true,
                text: 'Date',
                color: '#8b5cf6',
                font: {
                  size: 14,
                  weight: 'bold'
                }
              }
            }
          },
          interaction: {
            intersect: false,
            mode: 'index'
                    }
                }
            });
        }

    // Auto-refresh every 30 seconds
    setInterval(loadLogs, 30000);

        // Initial load
    loadLogs();
    </script>
</body>
</html>
